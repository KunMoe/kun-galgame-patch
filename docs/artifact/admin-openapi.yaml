components:
  schemas:
    AdminArtifactDelete:
      additionalProperties: false
      properties:
        soft_deleted:
          type: boolean
        uuid:
          type: string
      required:
        - uuid
        - soft_deleted
      type: object
    AdminArtifactList:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/AdminArtifactRow"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        page:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - total
        - page
        - limit
      type: object
    AdminArtifactReclaim:
      additionalProperties: false
      properties:
        reclaimed:
          type: boolean
        uuid:
          type: string
      required:
        - uuid
        - reclaimed
      type: object
    AdminArtifactRow:
      additionalProperties: false
      properties:
        checksum:
          type: string
        created_at:
          format: date-time
          type: string
        file_key:
          type: string
        file_size:
          format: int64
          type: integer
        mime_type:
          type: string
        name:
          type: string
        public:
          type: boolean
        site_key:
          type: string
        status:
          description: Upload lifecycle status
          enum:
            - uploading
            - ready
            - failed
          type: string
        updated_at:
          format: date-time
          type: string
        uploader_client:
          type: string
        uploader_sub:
          type: string
        uuid:
          type: string
      required:
        - uuid
        - name
        - file_key
        - file_size
        - mime_type
        - site_key
        - status
        - public
        - uploader_sub
        - uploader_client
        - checksum
        - created_at
        - updated_at
      type: object
    AdminArtifactSiteStats:
      additionalProperties: false
      properties:
        bytes:
          format: int64
          type: integer
        count:
          format: int64
          type: integer
      required:
        - count
        - bytes
      type: object
    AdminArtifactStats:
      additionalProperties: false
      properties:
        by_site:
          additionalProperties:
            $ref: "#/components/schemas/AdminArtifactSiteStats"
          type: object
        failed:
          format: int64
          type: integer
        soft_deleted:
          format: int64
          type: integer
        total_bytes:
          format: int64
          type: integer
        total_count:
          format: int64
          type: integer
        uploading:
          format: int64
          type: integer
      required:
        - total_count
        - total_bytes
        - uploading
        - failed
        - soft_deleted
      type: object
    EnvelopeAdminArtifactDelete:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/EnvelopeAdminArtifactDelete.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/AdminArtifactDelete"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeAdminArtifactList:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/EnvelopeAdminArtifactList.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/AdminArtifactList"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeAdminArtifactReclaim:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/EnvelopeAdminArtifactReclaim.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/AdminArtifactReclaim"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeAdminArtifactStats:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/EnvelopeAdminArtifactStats.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/AdminArtifactStats"
        message:
          type: string
      required:
        - code
        - message
      type: object
    HouseError:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/HouseError.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        message:
          type: string
      required:
        - code
        - message
      type: object
info:
  title: KUN Artifact Admin API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/admin/artifact/list:
    get:
      operationId: adminListArtifacts
      parameters:
        - description: Filter by site key
          explode: false
          in: query
          name: site
          schema:
            description: Filter by site key
            type: string
        - description: Filter by upload status
          explode: false
          in: query
          name: status
          schema:
            description: Filter by upload status
            enum:
              - uploading
              - ready
              - failed
            type: string
        - description: Filter by uploader subject
          explode: false
          in: query
          name: uploader_sub
          schema:
            description: Filter by uploader subject
            type: string
        - description: Match filename substring or exact UUID
          explode: false
          in: query
          name: search
          schema:
            description: Match filename substring or exact UUID
            type: string
        - description: created_at lower bound (RFC3339)
          explode: false
          in: query
          name: from
          schema:
            description: created_at lower bound (RFC3339)
            type: string
        - description: created_at upper bound (RFC3339)
          explode: false
          in: query
          name: to
          schema:
            description: created_at upper bound (RFC3339)
            type: string
        - description: 1-based page number
          explode: false
          in: query
          name: page
          schema:
            description: 1-based page number
            format: int64
            type: integer
        - description: Items per page (max 200)
          explode: false
          in: query
          name: limit
          schema:
            description: Items per page (max 200)
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAdminArtifactList"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: List artifacts (paginated, filterable) — requires the ren role
      tags:
        - artifact-admin
  /api/v1/admin/artifact/stats:
    get:
      operationId: adminArtifactStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAdminArtifactStats"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Aggregate artifact usage stats (admin dashboard)
      tags:
        - artifact-admin
  /api/v1/admin/artifact/{uuid}:
    delete:
      operationId: adminDeleteArtifact
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAdminArtifactDelete"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Soft-delete an artifact — requires the ren role
      tags:
        - artifact-admin
  /api/v1/admin/artifact/{uuid}/reclaim:
    post:
      operationId: adminReclaimArtifact
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAdminArtifactReclaim"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Reclaim an interrupted upload (abort multipart + delete) — requires the ren role
      tags:
        - artifact-admin
