# Canonical oapi-codegen config for generating a Go client for the artifact
# service. Run from a consumer repo (forum / moyu) against the committed 3.0 spec:
#
#   oapi-codegen -config oapi-codegen.yaml openapi-3.0.yaml
#
# NOTES (see docs/artifact/10):
#  - Use the 3.0.x spec (openapi-3.0.yaml), NOT the canonical 3.1 (openapi.yaml):
#    oapi-codegen does not yet support OpenAPI 3.1.
#  - response-type-suffix avoids the generated <Op>Response wrappers colliding
#    with the *Response body schemas (e.g. InitUploadResponse).
package: artifactclient
output: artifact_client.gen.go
generate:
  models: true
  client: true
output-options:
  response-type-suffix: Resp
