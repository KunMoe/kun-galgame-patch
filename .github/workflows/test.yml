# Reusable CI test gate for the Go module under apps/api: build + vet + `go test`.
#
# One `unit` job, no service containers — every moyu test is self-contained
# (miniredis for Redis, mocked wiki/OAuth/artifact clients), so the whole suite
# runs green with nothing external. Catches "compiles but the logic regressed".
#
# Two entry points:
#   - pull_request (paths: apps/api) — standalone PR feedback.
#   - workflow_call — build.yml calls this as its first job, so images only
#     build / push / deploy when the suite is green (test -> build -> deploy).
# There is deliberately no standalone `push` trigger: on a master push build.yml
# runs and invokes this gate, so tests run before every deploy without a double
# run on the same commit.
name: test

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/test.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  # Include github.workflow so a standalone PR run and a build.yml-invoked run
  # never share a group and cancel each other.
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/api

jobs:
  unit:
    name: unit (build · vet · test, no services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
