components:
  schemas:
    ArtifactResponse:
      additionalProperties: false
      properties:
        checksum:
          type: string
        created_at:
          type: string
        description:
          type: string
        file_size:
          format: int64
          type: integer
        mime_type:
          type: string
        name:
          type: string
        public:
          type: boolean
        site_key:
          type: string
        status:
          format: int64
          type: integer
        uuid:
          type: string
      required:
        - uuid
        - site_key
        - name
        - description
        - file_size
        - mime_type
        - checksum
        - status
        - public
        - created_at
      type: object
    CompleteUploadRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/CompleteUploadRequest.json
          format: uri
          readOnly: true
          type: string
        manifest:
          $ref: "#/components/schemas/ManifestInput"
        parts:
          items:
            $ref: "#/components/schemas/CompletedPart"
          nullable: true
          type: array
      type: object
    CompletedPart:
      additionalProperties: false
      properties:
        etag:
          type: string
        part_number:
          format: int32
          type: integer
      required:
        - part_number
        - etag
      type: object
    DeleteData:
      additionalProperties: false
      properties:
        deleted:
          type: boolean
        uuid:
          type: string
      required:
        - uuid
        - deleted
      type: object
    DownloadResponse:
      additionalProperties: false
      properties:
        expires_at:
          type: string
        url:
          type: string
      required:
        - url
      type: object
    EnvelopeArtifactResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/EnvelopeArtifactResponse.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/ArtifactResponse"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeDeleteData:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/EnvelopeDeleteData.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/DeleteData"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeDownloadResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/EnvelopeDownloadResponse.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/DownloadResponse"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeInitUploadResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/EnvelopeInitUploadResponse.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/InitUploadResponse"
        message:
          type: string
      required:
        - code
        - message
      type: object
    EnvelopeListData:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/EnvelopeListData.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/ListData"
        message:
          type: string
      required:
        - code
        - message
      type: object
    HouseError:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/HouseError.json
          format: uri
          readOnly: true
          type: string
        code:
          format: int64
          type: integer
        message:
          type: string
      required:
        - code
        - message
      type: object
    InitUploadRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/InitUploadRequest.json
          format: uri
          readOnly: true
          type: string
        checksum:
          type: string
        description:
          type: string
        file_size:
          format: int64
          type: integer
        mime_type:
          type: string
        name:
          type: string
        public:
          type: boolean
        uploader_sub:
          type: string
      required:
        - name
        - file_size
      type: object
    InitUploadResponse:
      additionalProperties: false
      properties:
        expires_at:
          type: string
        multipart:
          type: boolean
        part_size:
          format: int64
          type: integer
        part_urls:
          items:
            $ref: "#/components/schemas/PartURL"
          nullable: true
          type: array
        upload_id:
          type: string
        upload_url:
          type: string
        uuid:
          type: string
      required:
        - uuid
        - multipart
        - expires_at
      type: object
    ListData:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ArtifactResponse"
          nullable: true
          type: array
        total:
          format: int64
          type: integer
      required:
        - items
        - total
      type: object
    ManifestInput:
      additionalProperties: false
      properties:
        arguments:
          type: string
        executable:
          type: string
        requirements:
          additionalProperties: {}
          type: object
        save_path:
          type: string
        working_dir:
          type: string
      required:
        - executable
      type: object
    PartURL:
      additionalProperties: false
      properties:
        part_number:
          format: int32
          type: integer
        url:
          type: string
      required:
        - part_number
        - url
      type: object
info:
  title: KUN Artifact Service
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/artifacts:
    get:
      operationId: listArtifacts
      parameters:
        - description: 1-based page number
          explode: false
          in: query
          name: page
          schema:
            description: 1-based page number
            format: int64
            type: integer
        - description: Items per page (max 100)
          explode: false
          in: query
          name: page_size
          schema:
            description: Items per page (max 100)
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeListData"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: List the site's artifacts (paginated)
      tags:
        - artifacts
    post:
      operationId: initUpload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitUploadRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeInitUploadResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Init an upload; returns presigned URL(s)
      tags:
        - artifacts
  /api/v1/artifacts/{uuid}:
    delete:
      operationId: deleteArtifact
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDeleteData"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Soft-delete an artifact (GC reclaims after TTL)
      tags:
        - artifacts
    get:
      operationId: getArtifact
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeArtifactResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Get artifact metadata
      tags:
        - artifacts
  /api/v1/artifacts/{uuid}/complete:
    post:
      operationId: completeUpload
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUploadRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeArtifactResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Finalize an upload (verify size, optional manifest)
      tags:
        - artifacts
  /api/v1/artifacts/{uuid}/download:
    get:
      operationId: downloadArtifact
      parameters:
        - description: Artifact UUID
          in: path
          name: uuid
          required: true
          schema:
            description: Artifact UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDownloadResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseError"
          description: Error
      summary: Issue a download URL (presigned, or Worker URL for public)
      tags:
        - artifacts
